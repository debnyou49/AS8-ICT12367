<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Debnyou{% endblock %}</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background: radial-gradient(circle at top left,#0f2027,#203a43,#2c5364);
    color:white;
    min-height:100vh;
    font-family: 'Segoe UI', sans-serif;
}

/* Navbar */
.navbar{
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(10px);
}

/* Hero */
.hero{
    padding:100px 20px;
    text-align:center;
}

.hero h1{
    font-size:3.5rem;
    font-weight:800;
    background: linear-gradient(90deg,#00f5ff,#00ff88);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
}

.hero p{
    font-size:1.2rem;
    opacity:0.9;
}

.btn-main{
    background:linear-gradient(45deg,#00f5ff,#00ff88);
    border:none;
    padding:12px 30px;
    border-radius:30px;
    font-weight:bold;
    transition:0.3s;
}

.btn-main:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #00ffcc;
}

/* Service Cards */
.service-card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    border-radius:20px;
    padding:30px;
    transition:0.4s;
}

.service-card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 30px rgba(0,255,255,0.4);
}

footer{
    margin-top:80px;
    padding:20px;
    background: rgba(0,0,0,0.6);
    text-align:center;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand fw-bold" href="/">🚀 Debnyou</a>
<div>
<a class="btn btn-outline-light me-2" href="/">Home</a>
<a class="btn btn-outline-light me-2" href="/about/">About</a>
<a class="btn btn-outline-light" href="/form/">Contact</a>
</div>
</div>
</nav>

<!-- 🔥 ตรงนี้สำคัญมาก -->
{% block content %}
{% endblock %}

<footer>
© 2026 Debnyou | All Rights Reserved
</footer>

</body>
</html>
